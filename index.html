<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightchain AI | IAM Control Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0b10;
            --sidebar: #141620;
            --accent: #00f2ff;
            --text: #e0e0e0;
            --dim: #888;
            --green: #00ffaa;
            --border: #2a2d3e;
            --console-bg: #000;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- LEFT MENU --- */
        nav {
            width: 250px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .nav-brand { padding: 0 25px 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .nav-brand h1 { color: var(--accent); font-size: 1.2rem; margin: 0; letter-spacing: 1px; }

        .nav-item {
            padding: 12px 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            color: var(--dim);
        }

        .nav-item:hover, .nav-item.active { background: rgba(0, 242, 255, 0.05); color: var(--accent); border-right: 3px solid var(--accent); }

        /* --- MAIN WRAPPER --- */
        .main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* --- TOP NAV --- */
        header {
            height: 70px;
            background: var(--sidebar);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .price-strip { display: flex; gap: 20px; }
        .stat-tag { background: #0a0b10; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 0.8rem; }
        .stat-tag span { color: var(--accent); font-weight: bold; }

        .wallet-section { display: flex; align-items: center; gap: 15px; }
        .btn-wallet { background: var(--accent); color: #000; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* --- DASHBOARD CONTENT --- */
        main { flex: 1; padding: 30px; overflow-y: auto; }

        .card { background: var(--sidebar); border-radius: 12px; border: 1px solid var(--border); padding: 25px; margin-bottom: 20px; }
        
        /* Telemetry Table */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--dim); font-size: 0.75rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 15px 10px; border-bottom: 1px solid #1c1e2a; font-size: 0.9rem; }
        
        .status-pill { padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .online { background: rgba(0, 255, 170, 0.1); color: var(--green); }
        .offline { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; }

        /* --- SYSTEM CONSOLE --- */
        .console-area {
            height: 180px;
            background: var(--console-bg);
            border-top: 1px solid var(--border);
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: var(--green);
            overflow-y: auto;
        }

    </style>
</head>
<body>

    <nav>
        <div class="nav-brand">
            <h1>LIGHTCHAIN AI</h1>
            <small style="color:var(--dim)">IAM V2.1 Sirius</small>
        </div>
        <div class="nav-item active"><i class="fas fa-chart-line"></i> Dashboard</div>
        <div class="nav-item"><i class="fas fa-microchip"></i> Node Cluster</div>
        <div class="nav-item"><i class="fas fa-brain"></i> AIVM Models</div>
        <div class="nav-item"><i class="fas fa-shield-alt"></i> PoI Registry</div>
    </nav>

    <div class="main-container">
        <header>
            <div class="price-strip">
                <div class="stat-tag">LCAI: <span id="lcaiPrice">$0.0024</span></div>
                <div class="stat-tag">ETH: <span id="ethPrice">$3,842.10</span></div>
            </div>
            <div class="wallet-section">
                <div id="balanceDisp" class="stat-tag" style="display:none">BAL: <span>0.00 LCAI</span></div>
                <button id="connectBtn" class="btn-wallet" onclick="connectWallet()">CONNECT WALLET</button>
            </div>
        </header>

        <main>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="margin:0;">Active Model Telemetry</h2>
                    <span id="refreshTimer" style="font-size:0.8rem; color:var(--dim)">Next sync: 15s</span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>MODEL ENDPOINT</th>
                            <th>STATUS</th>
                            <th>LOAD</th>
                            <th>UPTIME</th>
                            <th>POI VERIFIED</th>
                        </tr>
                    </thead>
                    <tbody id="telemetryBody">
                        </tbody>
                </table>
            </div>
        </main>

        <div class="console-area" id="console">
            > Initializing Lightchain IAM Core...<br>
            > Establishing Sirius V2 RPC Handshake...<br>
            > Ready.
        </div>
    </div>

    <script>
        const RPC_URL = "https://rpc2.siriusnet.io";
        const NODES = [
            { id: "AIVM-Llama-3", addr: "0x9ca8530ca349c966fe9ef903df17a75b8a778927" },
            { id: "LCAI-Diffusion-V1", addr: "0x2e41d0d7e8a5ec7aa7ac7a72ce69b2b79028b9c0" },
            { id: "SIRIUS-Oracle-X", addr: "0x7a47e1b744d90660148b56afc7ce85d206289d6d" }
        ];

        async function pollTelemetry() {
            logConsole("Polling Testnet Validators...");
            const provider = new ethers.JsonRpcProvider(RPC_URL);
            const tbody = document.getElementById('telemetryBody');
            let html = "";

            for(let node of NODES) {
                try {
                    const balance = await provider.getBalance(node.addr);
                    const isLive = balance > 0n;
                    const load = isLive ? Math.floor(Math.random() * 40 + 10) + "%" : "0%";
                    
                    html += `
                        <tr>
                            <td><strong>${node.id}</strong><br><small style="color:var(--dim)">${node.addr.slice(0,12)}...</small></td>
                            <td><span class="status-pill ${isLive ? 'online' : 'offline'}">${isLive ? 'ACTIVE' : 'OFFLINE'}</span></td>
                            <td>${load}</td>
                            <td>${isLive ? '99.98%' : '0.00%'}</td>
                            <td>${isLive ? '<i class="fas fa-check-circle" style="color:var(--green)"></i>' : '--'}</td>
                        </tr>
                    `;
                } catch(e) { logConsole(`Error reaching ${node.id}: RPC Timeout`); }
            }
            tbody.innerHTML = html;
        }

        function logConsole(msg) {
            const c = document.getElementById('console');
            c.innerHTML += `<br>> [${new Date().toLocaleTimeString()}] ${msg}`;
            c.scrollTop = c.scrollHeight;
        }

        async function connectWallet() {
            if(!window.ethereum) return alert("MetaMask required");
            const provider = new ethers.BrowserProvider(window.ethereum);
            const accts = await provider.send("eth_requestAccounts", []);
            document.getElementById('connectBtn').innerText = accts[0].slice(0,6) + "..." + accts[0].slice(-4);
            document.getElementById('balanceDisp').style.display = 'block';
            logConsole("Wallet Linked: Auth Level 1 granted.");
        }

        // Init
        pollTelemetry();
        setInterval(pollTelemetry, 15000);
    </script>
</body>
</html>
