<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lightchain AI | IAM Control Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #0070ff; --bg: #020408; --panel: #0b0e14; --border: #1e2633; --text-dim: #6a768a; --console-bg: #05070a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 280px; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; background: var(--panel); box-sizing: border-box; }
        .nav-logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); margin-bottom: 25px; font-size: 1.1rem; text-align: center; }
        .system-console { background: var(--console-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 0.65rem; height: 180px; overflow-y: auto; margin-bottom: 20px; color: #4e5d75; line-height: 1.5; }
        .console-line { margin-bottom: 4px; border-left: 2px solid #1a202c; padding-left: 8px; }
        .console-line.success { border-left-color: var(--accent); color: #fff; }
        .console-line.error { border-left-color: #ff4444; color: #ff4444; }
        .nav-menu { display: flex; flex-direction: column; gap: 5px; }
        .nav-link { color: var(--text-dim); padding: 12px 15px; cursor: pointer; border-radius: 6px; border: none; background: none; text-align: left; font-size: 0.75rem; font-family: monospace; width: 100%; font-weight: 600; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { color: white; background: var(--accent); }
        .viewport { flex: 1; display: flex; flex-direction: column; }
        header { height: 80px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; box-sizing: border-box; }
        .pill { background: #000; border: 1px solid var(--border); border-radius: 50px; padding: 7px 20px; font-size: 0.7rem; color: var(--accent); font-family: monospace; display: flex; align-items: center; gap: 12px; }
        .wallet-pill { background: var(--accent); color: white; border-radius: 50px; padding: 9px 24px; font-weight: 900; cursor: pointer; border: none; font-size: 0.75rem; font-family: monospace; letter-spacing: 1px; }
        .view-pane { flex: 1; padding: 40px; display: none; overflow-y: auto; }
        .view-pane.active { display: block !important; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 12px; max-width: 900px; border-top: 4px solid var(--accent); margin-bottom: 20px; }
        .panel-input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 12px; box-sizing: border-box; font-family: monospace; }
        .action-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
<nav>
    <div class="nav-logo">LCAI <span>IAM</span></div>
    <div class="system-console" id="console"><div class="console-line">>> KERNEL_READY</div></div>
    <div id="side-menu" class="nav-menu">
        <button class="nav-link active" onclick="showView('gallery-view', this); initGallery();">NETWORK GALLERY</button>
    </div>
</nav>

<div class="viewport">
    <header>
        <div class="pill">
            MODEL: <span id="active-model">AIVM-THETA</span> | 
            REV: <span id="nav-rev">0.00</span> LCAI | 
            STATE: <span id="status-txt">IDLE</span>
        </div>
        <div class="header-right"><button id="wallet-btn" class="wallet-pill" onclick="connectWallet()">CONNECT WALLET</button></div>
    </header>

    <div id="gallery-view" class="view-pane active">
        <div class="card">
            <h2>NETWORK GALLERY</h2>
            <div id="gallery-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px;"></div>
        </div>
    </div>

    <div id="id-view" class="view-pane">
        <div class="card">
            <h2>ZK-SBT IDENTITY CARD</h2>
            <div style="display: flex; gap: 30px; align-items: flex-start;">
                <div style="flex: 1;">
                    <pre id="id-json" onclick="downloadJSON()" style="background:#05070a; padding:20px; border:1px solid #1e2633; font-size:0.7rem; color:#4e5d75; cursor:pointer;">// Identity Offline</pre>
                    <button class="action-btn" onclick="downloadJSON()" style="margin-top: 15px; background: #1a202c;">DOWNLOAD JSON</button>
                </div>
                <div id="qr-container" style="text-align: center;">
                    <div id="qr-target" onclick="downloadQR()" style="background:white; padding:15px; border-radius:8px; cursor:pointer;"></div>
                    <p style="font-size: 0.6rem; color: var(--text-dim); margin-top: 10px;">CLICK TO DOWNLOAD QR</p>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-view" class="view-pane">
        <div class="card">
            <h2>TREASURY & ADMIN</h2>
            <div style="background:#000; padding:20px; border-radius:8px; margin-bottom:20px; border:1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <p style="font-size: 0.6rem; color: var(--text-dim); margin: 0;">VAULT BALANCE</p>
                    <h3 id="vault-bal" style="margin: 5px 0 0 0; color: var(--accent);">0.00 LCAI</h3>
                </div>
                <button class="action-btn" onclick="runWithdraw()" style="width: auto; padding: 10px 30px;">WITHDRAW</button>
            </div>
            <input type="text" class="panel-input" id="admin-addr" placeholder="0x...">
            <div style="display:flex; gap:10px;">
                <button class="action-btn" onclick="runAdmin('query')" style="flex:1">QUERY STATUS</button>
                <button class="action-btn" onclick="verifySelf()" style="flex:1; background:#00c853;">VERIFY SELF</button>
            </div>
        </div>
    </div>
</div>

<script>
const CONFIG = {
    addr: "0xB6FbB06e865f1784A74F5953051C3782729FD04E",
    abi: [
        "function owner() public view returns (address)",
        "function setVerification(address user, bool status) external",
        "function withdraw() external",
        "function manualVerified(address) public view returns (bool)",
        "event InferenceRequested(address indexed user, string prompt)"
    ]
};

let user, provider, signer, contract, roles = { isOwner: false, isVerified: false };

const log = (msg, type = "info") => {
    const cb = document.getElementById('console');
    const l = document.createElement('div');
    l.className = `console-line ${type === 'success' ? 'success' : type === 'error' ? 'error' : ''}`;
    l.innerText = `>> ${msg}`;
    cb.appendChild(l);
    cb.scrollTop = cb.scrollHeight;
};

async function connectWallet() {
    if (!window.ethereum) return log("METAMASK MISSING", "error");
    try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        user = accounts[0];
        provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();
        contract = new ethers.Contract(CONFIG.addr, CONFIG.abi, signer);
        
        const ownerAddr = await contract.owner();
        roles.isOwner = (user.toLowerCase() === ownerAddr.toLowerCase());
        roles.isVerified = await contract.manualVerified(user);

        log(`STREAK_SYNC: ${user.slice(0, 10)}`, "success");
        updateMenu(); updateIdentity(); initGallery(); refreshBalances();
    } catch (e) { log("HANDSHAKE FAILED", "error"); }
}

async function refreshBalances() {
    const vBal = await provider.getBalance(CONFIG.addr);
    document.getElementById('nav-rev').innerText = ethers.formatEther(vBal).slice(0,4);
    document.getElementById('vault-bal').innerText = `${ethers.formatEther(vBal).slice(0,6)} LCAI`;
}

async function runWithdraw() {
    try {
        const tx = await contract.withdraw();
        await tx.wait(); log("VAULT WITHDRAWN", "success"); refreshBalances();
    } catch (e) { log("WITHDRAW FAILED", "error"); }
}

function updateIdentity() {
    const meta = { "identity": user, "role": roles.isOwner ? "OWNER" : "OPERATOR", "status": roles.isVerified ? "VERIFIED" : "GUEST" };
    document.getElementById('id-json').innerText = JSON.stringify(meta, null, 4);
    document.getElementById('qr-target').innerHTML = "";
    new QRCode(document.getElementById("qr-target"), { text: user, width: 140, height: 140 });
}

function downloadJSON() {
    const blob = new Blob([document.getElementById('id-json').innerText], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'LCAI_ID.json'; a.click();
}

function downloadQR() {
    const a = document.createElement('a');
    a.href = document.querySelector('#qr-target img').src; a.download = 'LCAI_QR.png'; a.click();
}

function updateMenu() {
    const menu = document.getElementById('side-menu');
    let html = `<button class="nav-link active" onclick="showView('gallery-view', this); initGallery();">NETWORK GALLERY</button>`;
    if(user) {
        html += `<button class="nav-link" onclick="showView('id-view', this)">ZK IDENTITY</button>`;
        if(roles.isOwner) html += `<button class="nav-link" onclick="showView('admin-view', this)">ADMIN PANEL</button>`;
    }
    menu.innerHTML = html;
}

function showView(id, btn) {
    document.querySelectorAll('.view-pane').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

async function verifySelf() {
    try {
        const tx = await contract.setVerification(user, true);
        await tx.wait(); log("VERIFIED SUCCESS", "success");
        roles.isVerified = true; updateMenu();
    } catch (e) { log("VERIFY FAILED", "error"); }
}

async function initGallery() {
    const grid = document.getElementById('gallery-grid');
    grid.innerHTML = "SCANNING...";
    // Restoration logic for gallery events...
}

window.addEventListener('load', () => setTimeout(connectWallet, 500));
</script>
</body>
</html>
