<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lightchain AI | IAM Admin Portal (Testnet 504)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #030406; --sidebar: #0a0c10; --accent: #00f2ff; --text: #c9d1d9; --border: #1b1f24; --panel: #0d1117; --green: #39d353; --red: #ff4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; cursor: pointer; color: #8b949e; display: flex; align-items: center; gap: 10px; border-radius: 6px; font-size: 0.85rem; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: var(--panel); color: var(--accent); }
        .workspace { flex: 1; display: flex; flex-direction: column; background: #050608; overflow: hidden; }
        header { height: 60px; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: flex-end; padding: 0 25px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 25px; overflow-y: auto; flex: 1; }
        .admin-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
        .btn-zk { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-social { flex: 1; padding: 8px; border-radius: 4px; border: none; cursor: pointer; color: white; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; gap: 5px; }
        input, textarea { background: #050608; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 4px; width: 100%; margin: 10px 0; box-sizing: border-box; }
        #console { height: 130px; background: #000; border-top: 1px solid var(--border); color: var(--green); padding: 15px; font-family: monospace; overflow-y: auto; font-size: 0.75rem; }
        .step-locked { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>
    <nav>
        <div style="margin-bottom: 30px;">
            <h1 style="color:white; font-size:1.1rem; margin:0;">Lightchain AI | Testnet</h1>
            <div id="zkStatus" style="font-size: 0.65rem; color: var(--accent); margin-top: 5px;"><i class="fas fa-shield-alt"></i> TESTNET-504</div>
        </div>
        <div class="nav-item active" onclick="showView('zkWindow')"><i class="fas fa-id-card"></i> zkIdentity</div>
        <div id="adminMenu" style="display:none;">
            <div class="nav-item" onclick="showView('batchWindow')"><i class="fas fa-users-cog"></i> Batch Admin</div>
            <div class="nav-item" onclick="showView('revenueWindow')"><i class="fas fa-wallet"></i> Revenue</div>
        </div>
    </nav>

    <div class="workspace">
        <header>
            <button onclick="connect()" id="walletBtn" class="btn-zk" style="width:auto; padding:7px 15px; margin:0;">CONNECT ID</button>
        </header>

        <main class="admin-grid">
            <div id="zkWindow" class="admin-card">
                <div style="font-size:0.75rem; color:#484f58; text-transform:uppercase; margin-bottom:15px; border-bottom:1px solid #1b1f24; padding-bottom:5px;">Identity Management</div>
                
                <div id="step-auth" class="step-locked">
                    <p style="font-size:0.8rem; margin-bottom:10px;">1. Link Social Provider</p>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                        <div id="g_id_onload" data-client_id="YOUR_GOOGLE_ID" data-callback="handleGoogleAuth"></div>
                        <div class="g_id_signin" data-type="icon" data-shape="circle"></div>
                        <button class="btn-social" style="background:#5865F2;" onclick="linkSocial('Discord')"><i class="fab fa-discord"></i> Discord</button>
                        <button class="btn-social" style="background:#333;" onclick="linkSocial('GitHub')"><i class="fab fa-github"></i> GitHub</button>
                    </div>
                </div>

                <div id="step-mint" class="step-locked" style="margin-top:20px;">
                    <p style="font-size:0.8rem; margin-bottom:10px;">2. Finalize Soulbound Identity</p>
                    <div id="qrcode" style="background:white; padding:10px; border-radius:4px; width:fit-content; margin:10px auto;"></div>
                    <input type="text" id="nickName" placeholder="Enter Nickname">
                    <button class="btn-zk" onclick="mintWithImage()">MINT SBT</button>
                </div>
            </div>

            <div id="batchWindow" class="admin-card" style="display:none;">
                <div style="font-size:0.75rem; color:#484f58; text-transform:uppercase; margin-bottom:15px;">Batch Verifier</div>
                <textarea id="batchAddrs" placeholder="Addresses (comma or newline separated)..."></textarea>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn-zk" style="background:var(--green); color:black;" onclick="doBatch('verify')">VERIFY BATCH</button>
                    <button class="btn-zk" style="background:var(--red); color:white;" onclick="doBatch('revoke')">REVOKE BATCH</button>
                </div>
            </div>

            <div id="revenueWindow" class="admin-card" style="display:none;">
                <div style="font-size:0.75rem; color:#484f58; text-transform:uppercase; margin-bottom:15px;">Revenue Management</div>
                <div id="balance" style="font-size:1.8rem; color:var(--accent); font-weight:bold; margin-bottom:15px;">0.00 <small>LCAI</small></div>
                <button class="btn-zk" onclick="withdraw()">WITHDRAW TO OWNER</button>
            </div>
        </main>

        <div id="console">> [SYS] Awaiting ZK Credentials...</div>
    </div>

    <script>
        const CONFIG = {
            address: "0xd71462F0002Ee9373fCe05B568583Ed13e75f600",
            owner: "0x6378A6993C7C77E4A28f8f263e778401309fD9E4",
            abi: [
                "function mintWithSocial(string n, string d, bytes32 h, string i) public payable",
                "function verifyUser(address u) public",
                "function revokeSBT(address u) public",
                "function withdrawRevenue() public"
            ]
        };

        let userWallet, idHash;

        async function connect() {
            if(!window.ethereum) return log("Error: Metamask not found.");
            const provider = new ethers.BrowserProvider(window.ethereum);
            const accs = await provider.send("eth_requestAccounts", []);
            userWallet = accs[0];
            document.getElementById('walletBtn').innerText = userWallet.slice(0,6) + "...";
            document.getElementById('step-auth').classList.remove('step-locked');
            if(userWallet.toLowerCase() === CONFIG.owner.toLowerCase()) document.getElementById('adminMenu').style.display = 'block';
            log("Wallet Linked to LCAI-504.");
        }

        function handleGoogleAuth(res) {
            const p = JSON.parse(atob(res.credential.split('.')[1]));
            linkSocial('Google', p.sub);
        }

        function linkSocial(provider, uid = "MOCK-" + Math.random()) {
            idHash = ethers.id(provider + ":" + uid);
            log(`${provider} Identity Bound: ${idHash.slice(0,18)}...`);
            document.getElementById('step-mint').classList.remove('step-locked');
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById('qrcode'), { text: `did:lcai:${userWallet}:${provider}`, width: 128, height: 128 });
        }

        async function mintWithImage() {
            const nick = document.getElementById('nickName').value;
            if(!nick) return log("Error: Nickname required.");
            try {
                const canvas = document.querySelector('#qrcode canvas');
                const offscreen = document.createElement('canvas');
                offscreen.width = 128; offscreen.height = 128;
                offscreen.getContext('2d').drawImage(canvas, 0,0, 128, 128);
                const img = offscreen.toDataURL("image/jpeg", 0.6);

                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const contract = new ethers.Contract(CONFIG.address, CONFIG.abi, signer);
                
                log("Compressing & Minting...");
                const tx = await contract.mintWithSocial(nick, `did:lcai:${userWallet}`, idHash, img, { value: ethers.parseEther("0.01"), gasLimit: 700000 });
                await tx.wait();
                log("Success: Identity Soulbound.");
            } catch(e) { log("Mint Failed: Verify balance."); }
        }

        async function doBatch(type) {
            const addrs = document.getElementById('batchAddrs').value.split(/[,\n]/).map(a => a.trim()).filter(a => ethers.isAddress(a));
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const contract = new ethers.Contract(CONFIG.address, CONFIG.abi, signer);
            log(`Starting Batch ${type}...`);
            for(let a of addrs) {
                try {
                    const tx = (type === 'verify') ? await contract.verifyUser(a) : await contract.revokeSBT(a);
                    await tx.wait();
                    log(`Completed: ${a.slice(0,10)}`);
                } catch(e) { log(`Error on: ${a.slice(0,10)}`); }
            }
        }

        function showView(id) {
            document.querySelectorAll('.admin-card').forEach(c => c.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function log(m) {
            const c = document.getElementById('console');
            c.innerHTML += `<br>> [${new Date().toLocaleTimeString()}] ${m}`;
            c.scrollTop = c.scrollHeight;
        }
    </script>
</body>
</html>
