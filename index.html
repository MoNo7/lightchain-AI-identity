<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lightchain AI | IAM Control Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #0070ff; --bg: #020408; --panel: #0b0e14; --border: #1e2633; --text-dim: #6a768a; --console-bg: #05070a; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 280px; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; background: var(--panel); box-sizing: border-box; }
        .nav-logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); margin-bottom: 25px; font-size: 1.1rem; text-align: center; }
        .system-console { background: var(--console-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 0.65rem; height: 180px; overflow-y: auto; margin-bottom: 20px; color: #4e5d75; line-height: 1.5; }
        .console-line { margin-bottom: 4px; border-left: 2px solid #1a202c; padding-left: 8px; }
        .console-line.success { border-left-color: var(--accent); color: #fff; }
        .nav-menu { display: flex; flex-direction: column; gap: 8px; }
        .nav-link { color: var(--text-dim); padding: 12px 15px; cursor: pointer; border-radius: 6px; border: none; background: rgba(255,255,255,0.03); text-align: left; font-size: 0.75rem; font-family: monospace; width: 100%; font-weight: 600; }
        .nav-link.active { color: white; background: var(--accent); }
        .viewport { flex: 1; display: flex; flex-direction: column; }
        header { height: 80px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; box-sizing: border-box; }
        .pill { background: #000; border: 1px solid var(--border); border-radius: 50px; padding: 7px 18px; font-size: 0.65rem; font-family: monospace; display: flex; align-items: center; gap: 10px; }
        .wallet-pill { background: var(--accent); color: white; border: none; padding: 9px 24px; border-radius: 50px; font-weight: 900; font-family: monospace; cursor: pointer; font-size: 0.75rem; }
        .view-pane { flex: 1; padding: 40px; display: none; overflow-y: auto; }
        .view-pane.active { display: block !important; }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 30px; border-radius: 12px; max-width: 900px; border-top: 4px solid var(--accent); margin-bottom: 20px; }
        .panel-input { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 12px; box-sizing: border-box; font-family: monospace; }
        .action-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
        #gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .thumb { background: #000; padding: 10px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .thumb img { width: 100%; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">LCAI <span>IAM</span></div>
    <div class="system-console" id="console">
        <div class="console-line">>> KERNEL_READY</div>
        <div id="worker-log" class="console-line" style="color:#00c853;">>> ACTIVE_WORKERS: 114</div>
    </div>
    <div class="nav-menu">
        <button class="nav-link active" onclick="showView('gallery-view', this); initGallery();">NETWORK GALLERY</button>
        <button class="nav-link" onclick="showView('id-view', this); updateIdentity();">ZK IDENTITY</button>
        <button class="nav-link" onclick="showView('admin-view', this)">ADMIN PANEL</button>
        <button class="nav-link" onclick="showView('aivm-view', this)">AIVM ART GEN</button>
    </div>
</nav>

<div class="viewport">
    <header>
        <div class="pill sys" style="color:var(--accent)">STATE: <span id="status-txt">IDLE</span> | LOAD: <span id="sys-load">42%</span></div>
        <div class="pill price">LCAI: <span id="lcai-price">$0.001984</span></div>
        <button id="wallet-btn" class="wallet-pill" onclick="connectWallet()">CONNECT WALLET</button>
    </header>

    <div id="gallery-view" class="view-pane active">
        <div class="card">
            <h2>NETWORK GALLERY</h2>
            <div id="gallery-grid"></div>
        </div>
    </div>

    <div id="id-view" class="view-pane">
        <div class="card" id="id-card">
            <h2>ZK-SBT IDENTITY</h2>
            <div style="display:flex; gap:20px; margin-bottom:20px;">
                <pre id="id-json" style="flex:1; background:#05070a; padding:15px; font-size:0.7rem; color:var(--text-dim); border:1px solid var(--border); overflow: hidden;">// Loading Identity...</pre>
                <div id="qr-target" style="background:white; padding:10px; border-radius:8px; cursor:pointer;" onclick="downloadQR()"></div>
            </div>
            <div id="id-action-zone">
                </div>
        </div>
    </div>

    <div id="admin-view" class="view-pane">
        <div class="card">
            <h2>ADMINISTRATION</h2>
            <button class="action-btn" style="background:#00c853;" onclick="verifySelf()">VERIFY SELF (ART PERMISSION)</button>
            <div style="margin-top: 20px;">
                <input type="text" id="admin-target" class="panel-input" placeholder="0x... Target Wallet Address">
                <button class="action-btn" onclick="adminAction('verify')">AUTHORIZE ADDRESS</button>
            </div>
        </div>
    </div>

    <div id="aivm-view" class="view-pane">
        <div class="card">
            <h2>AIVM NEURAL ENGINE</h2>
            <textarea id="art-prompt" class="panel-input" style="height:80px;" placeholder="Prompt the AIVM..."></textarea>
            <button class="action-btn" id="gen-btn" onclick="generateArt()">REQUEST INFERENCE (0.25 tLCAI)</button>
            <div id="render-box" style="margin-top:20px; text-align:center;">
                <img id="output-img" style="max-width:100%; border-radius:4px; display:none;">
            </div>
        </div>
    </div>
</div>

<script>
const CONFIG = {
    artAddr: "0xB6f1E497D6879C325c65fa77cB717227976fd04E",
    idAddr: "0x8300c9072bc9f926703f8e26ff0a5d963d88ae01",
    artAbi: [
        "function manualVerified(address) view returns (bool)",
        "function setVerification(address, bool) external",
        "function generateArt(string, bytes32) payable external",
        "event InferenceRequested(address indexed user, string prompt, bytes32 modelDigest)"
    ],
    idAbi: [
        "function profiles(address) view returns (string username, string did, bool isVerified, bool exists)",
        "function createProfile(string username, string did) external",
        "function verifyIdentity(address) external"
    ]
};

let user, provider, signer, artContract, idContract;

const log = (msg, type = "") => {
    const cb = document.getElementById('console');
    const l = document.createElement('div');
    l.className = `console-line ${type}`;
    l.innerText = `>> ${msg}`;
    cb.appendChild(l);
    cb.scrollTop = cb.scrollHeight;
};

async function connectWallet() {
    // FIX: Specifically look for MetaMask provider to prevent Coinbase override
    let metaMaskProvider = window.ethereum;
    if (window.ethereum?.providers) {
        metaMaskProvider = window.ethereum.providers.find(p => p.isMetaMask);
    }

    if (!metaMaskProvider) return log("METAMASK NOT FOUND", "error");

    try {
        const accounts = await metaMaskProvider.request({ method: 'eth_requestAccounts' });
        user = accounts[0];
        provider = new ethers.BrowserProvider(metaMaskProvider);
        signer = await provider.getSigner();
        artContract = new ethers.Contract(CONFIG.artAddr, CONFIG.artAbi, signer);
        idContract = new ethers.Contract(CONFIG.idAddr, CONFIG.idAbi, signer);
        
        const bal = await provider.getBalance(user);
        document.getElementById('wallet-btn').innerText = `${user.slice(0,6).toUpperCase()} | ${Math.floor(Number(ethers.formatEther(bal)))} LCAI`;
        
        log(`CONNECTED: ${user.slice(0,10)}...`, "success");
        updateIdentity();
        initGallery();
    } catch (e) { log("CONNECTION_FAILED", "error"); }
}

async function updateIdentity() {
    if(!user) return;
    try {
        const profile = await idContract.profiles(user);
        const isVerifiedArt = await artContract.manualVerified(user);
        
        const meta = {
            "address": user,
            "username": profile.exists ? profile.username : "UNREGISTERED",
            "did": (profile.exists && profile.did) ? profile.did : `did:lcai:${user.slice(2,8)}`,
            "verified_id": profile.isVerified,
            "verified_art": isVerifiedArt
        };

        document.getElementById('id-json').innerText = JSON.stringify(meta, null, 4);
        document.getElementById('qr-target').innerHTML = "";
        new QRCode(document.getElementById("qr-target"), { text: JSON.stringify(meta), width: 120, height: 120 });

        const zone = document.getElementById('id-action-zone');
        if(!profile.exists) {
            zone.innerHTML = `
                <input id="reg-user" class="panel-input" placeholder="Desired Username (e.g. MiMo)">
                <input id="reg-did" class="panel-input" placeholder="Custom DID (or leave blank for standard)">
                <button class="action-btn" onclick="registerProfile()">REGISTER IDENTITY</button>`;
        } else if(!profile.isVerified) {
            zone.innerHTML = `<button class="action-btn" style="background:#ffaa00;" onclick="mintZkVerify()">MINT ZK-VERIFY ATTESTATION</button>`;
        } else {
            zone.innerHTML = `<p style="color:#00c853; font-size:0.8rem; font-weight:bold;">✓ IDENTITY VERIFIED ON-CHAIN</p>`;
        }
    } catch (e) { console.error(e); }
}

async function registerProfile() {
    const u = document.getElementById('reg-user').value || "ANONYMOUS";
    let d = document.getElementById('reg-did').value;
    if(!d) d = `did:lcai:${user.slice(2,8)}`;
    
    try {
        log(`ANCHORING PROFILE: ${u}...`);
        const tx = await idContract.createProfile(u, d, { gasLimit: 300000 });
        await tx.wait();
        log("IDENTITY REGISTERED", "success");
        updateIdentity();
    } catch (e) { log("REG_FAILED: Profile may exist", "error"); }
}

async function mintZkVerify() {
    try {
        log("MINTING ZK-SBT...");
        const tx = await idContract.verifyIdentity(user, { gasLimit: 200000 });
        await tx.wait();
        log("ZK-VERIFY MINTED", "success");
        updateIdentity();
    } catch (e) { log("MINT_FAILED", "error"); }
}

async function generateArt() {
    const prompt = document.getElementById('art-prompt').value;
    if(!prompt) return log("ENTER PROMPT", "error");
    try {
        log("INITIATING INFERENCE...");
        const tx = await artContract.generateArt(prompt, ethers.ZeroHash, { 
            value: ethers.parseEther("0.25"),
            gasLimit: 500000 
        });
        await tx.wait();
        log("RENDER SUCCESS", "success");
        document.getElementById('output-img').src = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${tx.hash}`;
        document.getElementById('output-img').style.display = 'block';
        initGallery();
    } catch (e) { log("INFERENCE_REJECTED", "error"); }
}

async function initGallery() {
    const grid = document.getElementById('gallery-grid');
    if(!artContract) return;
    try {
        const events = await artContract.queryFilter("InferenceRequested", -5000);
        grid.innerHTML = "";
        events.reverse().slice(0, 10).forEach(ev => {
            grid.innerHTML += `<div class="thumb"><img src="https://pollinations.ai/p/${encodeURIComponent(ev.args.prompt)}?width=400&height=300&seed=${ev.transactionHash}"><p style="font-size:0.6rem; color:var(--text-dim);">${ev.args.prompt}</p></div>`;
        });
    } catch (e) { grid.innerHTML = "<p style='color:var(--text-dim); font-size:0.7rem;'>Syncing Gallery...</p>"; }
}

async function verifySelf() {
    try {
        log("AUTHORIZING ART PERMISSIONS...");
        const tx = await artContract.setVerification(user, true);
        await tx.wait();
        log("ART PERMISSION GRANTED", "success");
        updateIdentity();
    } catch (e) { log("VERIFY_SELF_FAILED", "error"); }
}

function downloadQR() {
    const canvas = document.querySelector('#qr-target canvas');
    const a = document.createElement('a'); a.href = canvas.toDataURL("image/png"); a.download = 'LCAI_Identity_QR.png'; a.click();
}

function showView(id, btn) {
    document.querySelectorAll('.view-pane').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-menu button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

window.onload = connectWallet;
</script>
</body>
</html>
