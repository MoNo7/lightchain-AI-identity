<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lightchain AI | IAM Control Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #050608; --sidebar: #0d0f14; --accent: #00f2ff; --text: #afb3c1; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* Sidebar & Telemetry */
        nav { width: 280px; background: var(--sidebar); border-right: 1px solid #1e222d; display: flex; flex-direction: column; padding: 20px; }
        .telemetry-card { background: #141721; border-radius: 8px; padding: 12px; margin-top: 20px; border-left: 3px solid var(--accent); }
        .node-row { display: flex; justify-content: space-between; font-size: 0.8rem; margin: 8px 0; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #00ffaa; box-shadow: 0 0 8px #00ffaa; }

        /* Main Content & Centered Tickers */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .ticker-container { text-align: center; width: 100%; max-width: 600px; }
        .ticker-box { background: #0d0f14; padding: 30px; border-radius: 15px; border: 1px solid #1e222d; margin-bottom: 20px; }
        .ticker-val { font-size: 3.5rem; font-weight: bold; color: white; display: block; }
        .ticker-label { color: var(--accent); letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav>
        <h2 style="color:white; margin-bottom:5px;">LIGHTCHAIN AI</h2>
        <small style="color:var(--accent)">IAM CONTROL CENTER v2.4</small>
        
        <div class="telemetry-card">
            <div style="font-weight:bold; margin-bottom:10px; font-size:0.9rem;">LIVE NODE TELEMETRY</div>
            <div id="nodeList">
                <div class="node-row"><span>Syncing with SiriusNet...</span></div>
            </div>
        </div>

        <button onclick="connectWallet()" style="margin-top:auto; padding:12px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer; border-radius:5px;">
            CONNECT WALLET
        </button>
    </nav>

    <main>
        <div class="ticker-container">
            <div class="ticker-box">
                <span class="ticker-label">Global Inference Power</span>
                <span class="ticker-val" id="infPower">1.24 <small style="font-size:1.5rem">Ph/s</small></span>
            </div>
            <div class="ticker-box">
                <span class="ticker-label">LCAI Network Security</span>
                <span class="ticker-val" id="netSec">99.98%</span>
            </div>
        </div>
    </main>

    <script>
        // Real Sirius V2 RPC & Node Data
        const RPC_URL = "https://rpc2.siriusnet.io";
        const NODES = [
            { id: "SIRIUS-ALPHA", addr: "0x9ca8530ca349c966fe9ef903df17a75b8a778927" },
            { id: "SIRIUS-BRAVO", addr: "0x2e41d0d7e8a5ec7aa7ac7a72ce69b2b79028b9c0" },
            { id: "SIRIUS-CHARLIE", addr: "0x7a47e1b744d90660148b56afc7ce85d206289d6d" }
        ];

        async function updateTelemetry() {
            const list = document.getElementById('nodeList');
            const provider = new ethers.JsonRpcProvider(RPC_URL);
            
            let html = "";
            for(let node of NODES) {
                try {
                    // Check if node address has a balance or activity on SiriusNet
                    const balance = await provider.getBalance(node.addr);
                    const isLive = balance > 0n; // Basic "active" check for testnet nodes

                    html += `
                        <div class="node-row">
                            <span><span class="status-dot ${isLive ? 'online' : ''}"></span>${node.id}</span>
                            <span style="color:white">${isLive ? 'ACTIVE' : 'OFFLINE'}</span>
                        </div>
                    `;
                } catch(e) {
                    html += `<div class="node-row"><span>${node.id}</span><span style="color:red">ERR</span></div>`;
                }
            }
            list.innerHTML = html;
        }

        // Run on load
        updateTelemetry();
        // Refresh every 30 seconds
        setInterval(updateTelemetry, 30000);
    </script>
</body>
</html>
